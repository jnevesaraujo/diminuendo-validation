name: Android CI

# Closes the Definition of Done loop: "compiles", "tests pass" and "lint passes"
# stop being the student's word and become automatically verified.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck --no-daemon

      - name: Unit tests
        run: ./gradlew test --no-daemon

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon
